<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatsito Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            background-color: var(--vscode-editor-background, #1e1e1e);
            color: var(--vscode-editor-foreground, #bbbbbb);
            font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif);
            font-size: var(--vscode-font-size, 13px);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Chat layout */
        .chat-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            height: 100%;
            overflow: hidden;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .empty-state {
            margin: auto;
            text-align: center;
            opacity: 0.6;
            max-width: 320px;
        }

        .empty-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        /* Message Bubbles */
        .message-wrapper {
            display: flex;
            width: 100%;
        }

        .user-wrapper {
            justify-content: flex-end;
        }

        .assistant-wrapper {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .user-bubble {
            background-color: var(--vscode-button-background, #007acc);
            color: var(--vscode-button-foreground, #ffffff);
            border-bottom-right-radius: 2px;
        }

        .assistant-bubble {
            background-color: var(--vscode-editorWidget-background, #252526);
            border: 1px solid var(--vscode-widget-border, rgba(255,255,255,0.1));
            color: var(--vscode-editorWidget-foreground, #cccccc);
            border-bottom-left-radius: 2px;
        }

        .message-meta {
            font-size: 9px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .user-bubble .message-meta {
            color: inherit;
        }

        .assistant-bubble .message-meta {
            color: var(--vscode-textLink-foreground, #3794ff);
        }

        /* Markdown elements inside message-bubble */
        .message-bubble p {
            margin: 0 0 8px 0;
        }

        .message-bubble p:last-child {
            margin-bottom: 0;
        }

        .message-bubble ul, .message-bubble ol {
            margin: 0 0 8px 0;
            padding-left: 20px;
        }

        .message-bubble li {
            margin-bottom: 4px;
        }

        .message-bubble pre {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--vscode-widget-border, rgba(255,255,255,0.05));
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }

        .message-bubble code {
            font-family: var(--vscode-editor-font-family, Consolas, monospace);
            font-size: 0.9em;
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 4px;
            border-radius: 4px;
            color: #d16969;
        }

        .message-bubble pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }

        /* Thinking / Loading Animation */
        .loading-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.7;
            padding-left: 4px;
        }

        .hourglass-loader {
            display: inline-block;
            position: relative;
            width: 14px;
            height: 14px;
        }

        .hourglass-loader:after {
            content: " ";
            display: block;
            border-radius: 50%;
            width: 0;
            height: 0;
            margin: 0px;
            box-sizing: border-box;
            border: 7px solid var(--vscode-textLink-foreground, #3794ff);
            border-color: var(--vscode-textLink-foreground, #3794ff) transparent var(--vscode-textLink-foreground, #3794ff) transparent;
            animation: hourglass 1.4s infinite ease-in-out;
        }

        @keyframes hourglass {
            0% { transform: rotate(0); }
            50% { transform: rotate(180deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 11px;
        }

        /* Input Area styling */
        .chat-input-panel {
            padding: 12px;
            border-top: 1px solid var(--vscode-widget-border, rgba(255,255,255,0.08));
            background-color: var(--vscode-editor-background);
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: var(--vscode-input-background, #3c3c3c);
            border: 1px solid var(--vscode-input-border, transparent);
            border-radius: 6px;
            padding: 4px 6px;
        }

        .input-group:focus-within {
            border-color: var(--vscode-focusBorder, #007fd4);
        }

        .chat-textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--vscode-input-foreground, #cccccc);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            resize: none;
            padding: 4px 0;
            max-height: 100px;
            overflow-y: auto;
            height: 18px;
            line-height: 18px;
        }

        .chat-textarea::placeholder {
            color: var(--vscode-input-placeholderForeground, #888888);
            font-size: 11px;
        }

        .btn-send {
            background-color: var(--vscode-button-background, #007acc);
            color: var(--vscode-button-foreground, #ffffff);
            border: none;
            border-radius: 4px;
            padding: 5px 10px;
            font-size: 11px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-send:hover {
            background-color: var(--vscode-button-hoverBackground, #0062a3);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-banner {
            background: var(--vscode-inputValidation-errorBackground, #5a1d1d);
            border: 1px solid var(--vscode-inputValidation-errorBorder, #be1100);
            color: var(--vscode-editor-foreground, #cccccc);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
        }

        .btn-clear {
            background: transparent;
            border: none;
            color: var(--vscode-descriptionForeground, #858585);
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            width: 24px;
            height: 24px;
        }

        .btn-clear:hover {
            color: var(--vscode-errorForeground, #f48771);
            background-color: var(--vscode-toolbar-hoverBackground, rgba(90, 93, 94, 0.31));
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-history" id="chatHistory">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">✦</div>
                <h3>Chatsito for VS Code</h3>
                <p>Start a conversation. The context window will adapt dynamically.</p>
            </div>
        </div>

        <div class="chat-input-panel">
            <div class="model-select-container" style="margin-bottom: 8px; display: flex; align-items: center; gap: 6px;">
                <span style="font-size: 11px; opacity: 0.7;">Model:</span>
                <select id="modelSelect" style="background: var(--vscode-dropdown-background, #3c3c3c); color: var(--vscode-dropdown-foreground, #cccccc); border: 1px solid var(--vscode-dropdown-border, #3c3c3c); border-radius: 4px; font-size: 11px; padding: 2px 4px; outline: none; cursor: pointer;" onchange="handleModelChange(this.value)">
                    <option value="">Loading models...</option>
                </select>
                <span style="font-size: 11px; opacity: 0.7; margin-left: 10px;">Mode:</span>
                <select id="modeSelect" style="background: var(--vscode-dropdown-background, #3c3c3c); color: var(--vscode-dropdown-foreground, #cccccc); border: 1px solid var(--vscode-dropdown-border, #3c3c3c); border-radius: 4px; font-size: 11px; padding: 2px 4px; outline: none; cursor: pointer;" onchange="handleModeChange(this.value)">
                    <option value="ai">AI-Mode</option>
                    <option value="hybrid">Hybrid-Mode</option>
                    <option value="user">User-Mode</option>
                </select>
            </div>
            <form id="chatForm" onsubmit="handleChatSubmit(event)">
                <div class="input-group">
                    <textarea 
                        id="promptInput" 
                        class="chat-textarea" 
                        placeholder="Type a message to Chatsito..." 
                        rows="1" 
                        onkeydown="submitOnEnter(event)"></textarea>
                    <button type="button" class="btn-clear" id="clearBtn" title="Clear Chat History" onclick="clearChat()">🗑️</button>
                    <button type="submit" class="btn-send" id="sendBtn">Send</button>
                </div>
            </form>
        </div>
    </div>
    <script src="{{webviewUiJsUri}}"></script>
    <script src="{{webviewApiJsUri}}"></script>
    <script src="{{webviewJsUri}}"></script>
</body>
</html>
